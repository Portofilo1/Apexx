<!DOCTYPE html>
<html>
<head>
    <title>Apexx</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0c0c14;
            color: #ffffff;
            padding: 16px;
            padding-bottom: 90px;
        }
        
        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
        }
        
        .user-id {
            background: #1e1e2a;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #9f9fb9;
            border: 1px solid #2c2c3a;
        }
        
        /* Баланс */
        .balance-card {
            background: #1a1a26;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #2c2c3a;
        }
        
        .balance-label {
            color: #9f9fb9;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .balance-amount {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
        }
        
        .balance-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            background: #2c2c3a;
            color: #ffffff;
            border: 1px solid #3a3a4a;
        }
        
        .btn:active {
            background: #3a3a4a;
        }
        
        /* Игры */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .game-card {
            background: #1a1a26;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2c2c3a;
            cursor: pointer;
        }
        
        .game-card.active {
            border: 2px solid #ffffff;
            background: #222230;
        }
        
        .game-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .game-desc {
            color: #9f9fb9;
            font-size: 12px;
        }
        
        /* Панель ставки */
        .bet-panel {
            background: #1a1a26;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2c2c3a;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
        }
        
        .amount-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .amount-btn {
            background: #2c2c3a;
            border: 1px solid #3a3a4a;
            color: #ffffff;
            padding: 14px 0;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        
        .amount-btn:active {
            background: #3a3a4a;
        }
        
        .custom-bet {
            display: flex;
            gap: 8px;
        }
        
        .custom-bet input {
            flex: 2;
            background: #2c2c3a;
            border: 1px solid #3a3a4a;
            color: #ffffff;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
        }
        
        .custom-bet button {
            flex: 1;
            background: #2c2c3a;
            border: 1px solid #3a3a4a;
            color: #ffffff;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Кнопка игры */
        .play-btn {
            width: 100%;
            padding: 18px;
            background: #2b8c5e;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            cursor: pointer;
            border: 1px solid #3aa875;
        }
        
        .play-btn:active {
            background: #3aa875;
        }
        
        /* Контейнеры игр */
        .game-container {
            background: #1a1a26;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2c2c3a;
        }
        
        .multiplier {
            font-size: 56px;
            font-weight: 700;
            text-align: center;
            color: #ffffff;
            margin: 20px 0;
        }
        
        .history {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .history-item {
            background: #2c2c3a;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid #3a3a4a;
        }
        
        /* Навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a26;
            border-top: 1px solid #2c2c3a;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px 24px;
        }
        
        .nav-item {
            text-align: center;
            color: #9f9fb9;
            font-size: 12px;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #ffffff;
        }
        
        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header">
        <div class="logo">Apexx</div>
        <div class="user-id" id="userIdDisplay">...</div>
    </div>

    <!-- Баланс -->
    <div class="balance-card">
        <div class="balance-label">Баланс</div>
        <div class="balance-amount" id="balanceDisplay">0</div>
        <div class="balance-actions">
            <button class="btn" onclick="deposit()">Пополнить</button>
            <button class="btn" onclick="withdraw()">Вывести</button>
        </div>
    </div>

    <!-- Игры -->
    <div class="games-grid">
        <div class="game-card active" onclick="switchGame('crash')" id="game-crash">
            <div class="game-title">Краш</div>
            <div class="game-desc">Множитель до x1000</div>
        </div>
        <div class="game-card" onclick="switchGame('mines')" id="game-mines">
            <div class="game-title">Мины</div>
            <div class="game-desc">Поле 5x5</div>
        </div>
        <div class="game-card" onclick="switchGame('tower')" id="game-tower">
            <div class="game-title">Башня</div>
            <div class="game-desc">8 уровней</div>
        </div>
        <div class="game-card" onclick="switchGame('dice')" id="game-dice">
            <div class="game-title">Кости</div>
            <div class="game-desc">Шанс 50%</div>
        </div>
    </div>

    <!-- Ставка -->
    <div class="bet-panel">
        <div class="section-title">Сумма ставки</div>
        <div class="amount-buttons">
            <button class="amount-btn" onclick="setBet(50)">50</button>
            <button class="amount-btn" onclick="setBet(100)">100</button>
            <button class="amount-btn" onclick="setBet(250)">250</button>
            <button class="amount-btn" onclick="setBet(500)">500</button>
        </div>
        <div class="custom-bet">
            <input type="number" id="customBet" placeholder="Своя сумма" min="1">
            <button onclick="setCustomBet()">OK</button>
        </div>
    </div>

    <!-- Краш -->
    <div id="game-crash-container">
        <div class="game-container">
            <div class="multiplier" id="crashMultiplier">1.00x</div>
            <div style="color: #9f9fb9; text-align: center; margin-bottom: 16px;">Ожидание ставки</div>
            <div class="history" id="crashHistory"></div>
        </div>
    </div>

    <!-- Мины (скрыто) -->
    <div id="game-mines-container" class="hidden">
        <div class="game-container">
            <div class="section-title">Выберите мин</div>
            <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                <button class="amount-btn" onclick="setMinesCount(3)">3</button>
                <button class="amount-btn" onclick="setMinesCount(5)">5</button>
                <button class="amount-btn" onclick="setMinesCount(7)">7</button>
            </div>
            <div id="minesMultiplier" style="color: #9f9fb9;">Множитель: 1.00x</div>
        </div>
    </div>

    <!-- Башня (скрыто) -->
    <div id="game-tower-container" class="hidden">
        <div class="game-container">
            <div id="towerMultiplier" style="color: #9f9fb9;">Множитель: 1.00x</div>
        </div>
    </div>

    <!-- Кости (скрыто) -->
    <div id="game-dice-container" class="hidden">
        <div class="game-container">
            <div style="text-align: center;">
                <div style="font-size: 48px; font-weight: 700; margin: 20px 0;" id="diceNumber">0</div>
                <div style="color: #9f9fb9;">Больше 50 — победа</div>
            </div>
        </div>
    </div>

    <!-- Кнопка игры -->
    <button class="play-btn" id="playButton" onclick="play()">ИГРАТЬ</button>

    <!-- Навигация -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('game')">
            <div class="nav-icon">🎮</div>
            <div>Игры</div>
        </div>
        <div class="nav-item" onclick="showTab('stats')">
            <div class="nav-icon">📊</div>
            <div>Статистика</div>
        </div>
        <div class="nav-item" onclick="showTab('leaderboard')">
            <div class="nav-icon">🏆</div>
            <div>Топ</div>
        </div>
        <div class="nav-item" onclick="showTab('settings')">
            <div class="nav-icon">⚙️</div>
            <div>Настройки</div>
        </div>
    </div>

    <script>
        // Telegram
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные
        let userId = tg.initDataUnsafe?.user?.id || 'Гость';
        document.getElementById('userIdDisplay').innerText = 'ID: ' + userId.toString().slice(-6);
        
        let balance = 1000;
        let currentBet = 100;
        let currentGame = 'crash';
        let gameActive = false;

        // API
        const API_URL = 'https://46764570fa656d.lhr.life';

        function updateBalance() {
            document.getElementById('balanceDisplay').innerText = balance;
        }

        function deposit() {
            tg.showAlert('Пополнение через Telegram Stars');
        }

        function withdraw() {
            tg.showAlert('Вывод от 1000 RUB');
        }

        function setBet(amount) {
            currentBet = amount;
            document.getElementById('customBet').value = amount;
        }

        function setCustomBet() {
            let val = parseInt(document.getElementById('customBet').value);
            if (val > 0) currentBet = val;
        }

        function setMinesCount(count) {
            let multiplier = (25 / (25 - count)).toFixed(2);
            document.getElementById('minesMultiplier').innerText = `Множитель: ${multiplier}x`;
        }

        function switchGame(game) {
            currentGame = game;
            
            document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`game-${game}`).classList.add('active');
            
            document.getElementById('game-crash-container').classList.add('hidden');
            document.getElementById('game-mines-container').classList.add('hidden');
            document.getElementById('game-tower-container').classList.add('hidden');
            document.getElementById('game-dice-container').classList.add('hidden');
            
            document.getElementById(`game-${game}-container`).classList.remove('hidden');
        }

        function play() {
            if (balance < currentBet) {
                tg.showAlert('Недостаточно средств');
                return;
            }

            gameActive = true;
            
            if (currentGame === 'crash') {
                balance -= currentBet;
                updateBalance();
                
                let multi = 1.0;
                let crashEl = document.getElementById('crashMultiplier');
                
                let interval = setInterval(() => {
                    if (!gameActive) {
                        clearInterval(interval);
                        return;
                    }
                    multi += 0.05;
                    crashEl.innerText = multi.toFixed(2) + 'x';
                    
                    if (Math.random() < 0.03) {
                        clearInterval(interval);
                        gameActive = false;
                        
                        if (Math.random() > 0.3) {
                            let win = Math.floor(currentBet * multi);
                            balance += win;
                            tg.showAlert(`Выигрыш: ${win}`);
                        } else {
                            tg.showAlert('Краш...');
                        }
                        updateBalance();
                    }
                }, 200);
            }
            
            if (currentGame === 'dice') {
                balance -= currentBet;
                let dice = Math.floor(Math.random() * 100) + 1;
                document.getElementById('diceNumber').innerText = dice;
                
                if (dice > 50) {
                    balance += currentBet * 2;
                    tg.showAlert('Победа!');
                } else {
                    tg.showAlert('Проигрыш');
                }
                updateBalance();
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if (tab === 'settings') {
                tg.showAlert('Настройки\n• Звук\n• Вибрация\n• Язык');
            }
        }

        // Старт
        updateBalance();
        switchGame('crash');
    </script>
</body>
</html>
