<!DOCTYPE html>
<html>
<head>
    <title>Apexx</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0e0e14;
            color: #ffffff;
            padding: 16px;
            padding-bottom: 90px;
        }
        .balance-card {
            background: linear-gradient(145deg, #1a1a24, #12121a);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a35;
            box-shadow: 0 8px 0 #0a0a0f;
        }
        .balance-label {
            color: #8b8ba0;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .balance-amount {
            font-size: 48px;
            font-weight: 700;
            color: #ffd966;
            text-shadow: 0 2px 0 #b28b40;
            margin-bottom: 16px;
        }
        .balance-actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }
        .btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .btn-green {
            background: #2b8c5e;
            color: white;
        }
        .btn-red {
            background: #b23b3b;
            color: white;
        }
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .game-card {
            background: #1a1a24;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2a35;
            border-bottom: 6px solid #0a0a0f;
            cursor: pointer;
        }
        .game-card.active {
            border-bottom-color: #ffd966;
            background: #22222f;
        }
        .game-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .game-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .game-desc {
            color: #8b8ba0;
            font-size: 12px;
        }
        .bet-panel {
            background: #1a1a24;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #2a2a35;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffd966;
        }
        .amount-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .amount-btn {
            background: #252530;
            border: none;
            color: white;
            padding: 14px 0;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            border-bottom: 4px solid #0e0e14;
            cursor: pointer;
        }
        .amount-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .custom-bet {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .custom-bet input {
            flex: 2;
            background: #252530;
            border: 1px solid #353540;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
        }
        .custom-bet button {
            flex: 1;
            background: #ffd966;
            border: none;
            color: #0e0e14;
            font-weight: 700;
            border-radius: 12px;
            border-bottom: 4px solid #b28b40;
            cursor: pointer;
        }
        .play-btn {
            width: 100%;
            padding: 18px;
            background: #ffd966;
            border: none;
            border-radius: 40px;
            font-size: 20px;
            font-weight: 700;
            color: #0e0e14;
            border-bottom: 6px solid #b28b40;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .play-btn:active {
            transform: translateY(2px);
            border-bottom-width: 4px;
        }
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
        }
        .mine-cell {
            aspect-ratio: 1;
            background: #252530;
            border-radius: 12px;
            border-bottom: 4px solid #0e0e14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
        }
        .mine-cell.revealed {
            background: #2b8c5e;
        }
        .mine-cell.mine {
            background: #b23b3b;
        }
        .tower-levels {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 20px 0;
        }
        .tower-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .tower-cell {
            aspect-ratio: 1;
            background: #252530;
            border-radius: 12px;
            border-bottom: 4px solid #0e0e14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
        }
        .tower-cell.won {
            background: #2b8c5e;
        }
        .tower-cell.lost {
            background: #b23b3b;
        }
        .crash-container {
            background: #252530;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
        }
        .multiplier {
            font-size: 64px;
            font-weight: 800;
            color: #ffd966;
            text-shadow: 0 4px 0 #b28b40;
        }
        .history {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .history-item {
            background: #1a1a24;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #2a2a35;
        }
        .history-item.win {
            color: #2b8c5e;
        }
        .history-item.loss {
            color: #b23b3b;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a24;
            border-top: 1px solid #2a2a35;
            display: flex;
            justify-content: space-around;
            padding: 12px 16px 24px;
        }
        .nav-item {
            text-align: center;
            color: #8b8ba0;
            font-size: 12px;
            cursor: pointer;
        }
        .nav-item.active {
            color: #ffd966;
        }
        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header">
        <div class="logo" style="font-size: 32px; font-weight: 800;">Apexx</div>
        <div style="background: #1a1a24; padding: 8px 16px; border-radius: 40px; border: 1px solid #2a2a35;">
            ID: <span id="userIdDisplay">...</span>
        </div>
    </div>

    <!-- Баланс -->
    <div class="balance-card">
        <div class="balance-label">Баланс</div>
        <div class="balance-amount" id="balanceDisplay">0</div>
        <div class="balance-actions">
            <button class="btn btn-green" onclick="deposit()">Пополнить</button>
            <button class="btn btn-red" onclick="withdraw()">Вывести</button>
        </div>
    </div>

    <!-- Игры -->
    <div class="games-grid">
        <div class="game-card active" onclick="switchGame('crash')" id="game-crash">
            <div class="game-icon">📈</div>
            <div class="game-title">Краш</div>
            <div class="game-desc">Множитель до х1000</div>
        </div>
        <div class="game-card" onclick="switchGame('mines')" id="game-mines">
            <div class="game-icon">💣</div>
            <div class="game-title">Мины</div>
            <div class="game-desc">5x5 поле</div>
        </div>
        <div class="game-card" onclick="switchGame('tower')" id="game-tower">
            <div class="game-icon">🗼</div>
            <div class="game-title">Башня</div>
            <div class="game-desc">8 уровней</div>
        </div>
        <div class="game-card" onclick="switchGame('dice')" id="game-dice">
            <div class="game-icon">🎲</div>
            <div class="game-title">Кости</div>
            <div class="game-desc">x2 множитель</div>
        </div>
    </div>

    <!-- Панель ставки -->
    <div class="bet-panel">
        <div class="section-title">Сумма ставки</div>
        <div class="amount-buttons">
            <button class="amount-btn" onclick="setBet(50)">50</button>
            <button class="amount-btn" onclick="setBet(100)">100</button>
            <button class="amount-btn" onclick="setBet(250)">250</button>
            <button class="amount-btn" onclick="setBet(500)">500</button>
        </div>
        <div class="custom-bet">
            <input type="number" id="customBet" placeholder="Своя сумма" min="1">
            <button onclick="setCustomBet()">OK</button>
        </div>
    </div>

    <!-- Контейнеры для игр -->
    <div id="game-crash-container">
        <div class="crash-container">
            <div class="multiplier" id="crashMultiplier">1.00x</div>
            <div style="color: #8b8ba0; margin-top: 10px;">Нажмите PLAY для начала</div>
        </div>
        <div class="history" id="crashHistory"></div>
    </div>

    <div id="game-mines-container" class="hidden">
        <div class="section-title">Выберите количество мин</div>
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <button class="amount-btn" onclick="setMinesCount(3)">3 💣</button>
            <button class="amount-btn" onclick="setMinesCount(5)">5 💣</button>
            <button class="amount-btn" onclick="setMinesCount(7)">7 💣</button>
            <button class="amount-btn" onclick="setMinesCount(10)">10 💣</button>
        </div>
        <div class="mines-grid" id="minesGrid"></div>
        <div class="section-title" id="minesMultiplier">Множитель: 1.00x</div>
    </div>

    <div id="game-tower-container" class="hidden">
        <div class="tower-levels" id="towerGrid"></div>
        <div class="section-title" id="towerMultiplier">Множитель: 1.00x</div>
    </div>

    <div id="game-dice-container" class="hidden">
        <div style="text-align: center; margin: 30px 0;">
            <div style="font-size: 72px; font-weight: 800; color: #ffd966;" id="diceNumber">0</div>
            <div style="font-size: 18px; margin-top: 10px;">Больше 50 — победа</div>
        </div>
    </div>

    <!-- Кнопка PLAY -->
    <button class="play-btn" id="playButton" onclick="play()">ИГРАТЬ</button>

    <!-- История -->
    <div class="history" id="gameHistory"></div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('game')">
            <div class="nav-icon">🎮</div>
            <div>Игры</div>
        </div>
        <div class="nav-item" onclick="showTab('stats')">
            <div class="nav-icon">📊</div>
            <div>Статистика</div>
        </div>
        <div class="nav-item" onclick="showTab('leaderboard')">
            <div class="nav-icon">🏆</div>
            <div>Топ</div>
        </div>
        <div class="nav-item" onclick="showTab('settings')">
            <div class="nav-icon">⚙️</div>
            <div>Настройки</div>
        </div>
    </div>

    <script>
        // Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные пользователя
        let userId = tg.initDataUnsafe?.user?.id || 'Гость';
        let userName = tg.initDataUnsafe?.user?.first_name || 'Игрок';
        document.getElementById('userIdDisplay').innerText = userId.toString().slice(-6);

        // Состояние
        let currentGame = 'crash';
        let balance = 1000; // Стартовый баланс для теста
        let currentBet = 100;
        let minesCount = 3;
        let gameActive = false;

        // Обновление баланса на экране
        function updateBalance() {
            document.getElementById('balanceDisplay').innerText = balance;
        }

        // Пополнение/вывод (заглушки)
        function deposit() {
            tg.showAlert('Пополнение через Telegram Stars скоро будет доступно');
        }

        function withdraw() {
            tg.showAlert('Вывод доступен от 1000 RUB');
        }

        // Переключение игр
        function switchGame(game) {
            currentGame = game;
            
            // Обновляем активный класс
            document.querySelectorAll('.game-card').forEach(card => {
                card.classList.remove('active');
            });
            document.getElementById(`game-${game}`).classList.add('active');
            
            // Показываем/скрываем контейнеры
            document.getElementById('game-crash-container').classList.add('hidden');
            document.getElementById('game-mines-container').classList.add('hidden');
            document.getElementById('game-tower-container').classList.add('hidden');
            document.getElementById('game-dice-container').classList.add('hidden');
            
            document.getElementById(`game-${game}-container`).classList.remove('hidden');
            
            // Отрисовываем поле для конкретной игры
            if (game === 'mines') drawMines();
            if (game === 'tower') drawTower();
        }

        // Установка ставки
        function setBet(amount) {
            currentBet = amount;
            document.getElementById('customBet').value = amount;
        }

        function setCustomBet() {
            let val = parseInt(document.getElementById('customBet').value);
            if (val > 0) currentBet = val;
        }

        // Для игры в мины
        function setMinesCount(count) {
            minesCount = count;
            drawMines();
        }

        function drawMines() {
            let grid = document.getElementById('minesGrid');
            grid.innerHTML = '';
            
            let multiplier = (25 / (25 - minesCount)).toFixed(2);
            document.getElementById('minesMultiplier').innerText = `Множитель: ${multiplier}x`;
            
            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.innerText = '?';
                cell.onclick = () => mineClick(i);
                grid.appendChild(cell);
            }
        }

        function mineClick(index) {
            if (!gameActive) {
                tg.showAlert('Сначала сделайте ставку');
                return;
            }
            // Тут будет логика с сервером
            tg.showAlert('Клик по мине #' + index);
        }

        function drawTower() {
            let container = document.getElementById('towerGrid');
            container.innerHTML = '';
            
            for (let level = 0; level < 8; level++) {
                let row = document.createElement('div');
                row.className = 'tower-row';
                
                for (let cell = 0; cell < 3; cell++) {
                    let cellDiv = document.createElement('div');
                    cellDiv.className = 'tower-cell';
                    cellDiv.innerText = '?';
                    cellDiv.onclick = () => towerClick(level, cell);
                    row.appendChild(cellDiv);
                }
                container.appendChild(row);
            }
        }

        function towerClick(level, cell) {
            if (!gameActive) {
                tg.showAlert('Сначала сделайте ставку');
                return;
            }
            tg.showAlert('Клик: уровень ' + (level+1) + ', клетка ' + (cell+1));
        }

        // Основная функция игры
        function play() {
            if (balance < currentBet) {
                tg.showAlert('Недостаточно средств');
                return;
            }

            gameActive = true;
            
            switch(currentGame) {
                case 'crash':
                    playCrash();
                    break;
                case 'mines':
                    playMines();
                    break;
                case 'tower':
                    playTower();
                    break;
                case 'dice':
                    playDice();
                    break;
            }
        }

        function playCrash() {
            balance -= currentBet;
            updateBalance();
            
            let crashEl = document.getElementById('crashMultiplier');
            let historyEl = document.getElementById('crashHistory');
            
            // Имитация краша
            let multiplier = 1.0;
            crashEl.innerText = multiplier.toFixed(2) + 'x';
            
            let interval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(interval);
                    return;
                }
                
                multiplier += 0.05;
                crashEl.innerText = multiplier.toFixed(2) + 'x';
                
                // Рандомный краш
                if (Math.random() < 0.03) {
                    clearInterval(interval);
                    gameActive = false;
                    
                    let won = Math.random() > 0.5;
                    if (won) {
                        let winAmount = Math.floor(currentBet * multiplier);
                        balance += winAmount;
                        tg.showAlert(`Выигрыш: ${winAmount}!`);
                    } else {
                        tg.showAlert('Краш... Проигрыш');
                    }
                    updateBalance();
                    
                    // Добавляем в историю
                    let historyItem = document.createElement('div');
                    historyItem.className = 'history-item ' + (won ? 'win' : 'loss');
                    historyItem.innerText = multiplier.toFixed(2) + 'x';
                    historyEl.prepend(historyItem);
                    if (historyEl.children.length > 8) {
                        historyEl.removeChild(historyEl.lastChild);
                    }
                }
            }, 200);
        }

        function playMines() {
            balance -= currentBet;
            updateBalance();
            tg.showAlert('Игра Мины начата! Открывайте клетки');
        }

        function playTower() {
            balance -= currentBet;
            updateBalance();
            tg.showAlert('Игра Башня начата! Выбирайте путь');
        }

        function playDice() {
            balance -= currentBet;
            let dice = Math.floor(Math.random() * 100) + 1;
            document.getElementById('diceNumber').innerText = dice;
            
            if (dice > 50) {
                let win = currentBet * 2;
                balance += win;
                tg.showAlert(`Победа! +${win}`);
            } else {
                tg.showAlert('Проигрыш');
            }
            updateBalance();
        }

        // Навигация по вкладкам
        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            if (tab === 'stats') {
                tg.showAlert(`Статистика:\nБаланс: ${balance}\nВсего игр: 0`);
            } else if (tab === 'leaderboard') {
                tg.showAlert('Топ игроков загружается...');
            } else if (tab === 'settings') {
                tg.showAlert('Настройки появятся позже');
            }
        }

        // Инициализация
        updateBalance();
        switchGame('crash');
    </script>
</body>
</html>
